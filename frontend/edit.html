<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Destinations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">✈ Travel<span>destinations</span></a>
  <ul class="navbar-nav" id="nav-auth-links"></ul>
  <div id="nav-user-info"></div>
</nav>

<div class="container section">
  <div id="loading-state" class="loading-overlay">
    <div class="spinner"></div>
    <span>Loading destination…</span>
  </div>

  <div class="form-card" id="edit-form-card" style="display:none">
    <div class="form-card-header">
      <h2>Edit Destination</h2>
      <p id="edit-subtitle">Update the details of your destination</p>
    </div>
    <div class="form-body">
      <div id="form-alert" class="alert alert-error"></div>
      <div id="success-alert" class="alert alert-success"></div>
      <div class="form-group">
        <label for="title">Title <span class="required">*</span></label>
        <input type="text" id="title" class="form-control" placeholder="e.g. Two Weeks in Kyoto" maxlength="200" />
        <div class="field-error" id="title-error"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="location">City / Location</label>
          <input type="text" id="location" class="form-control" placeholder="e.g. Kyoto" />
        </div>
        <div class="form-group">
          <label for="country">Country</label>
          <input type="text" id="country" class="form-control" placeholder="e.g. Japan" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="date_from">Date From</label>
          <input type="date" id="date_from" class="form-control" />
          <div class="field-error" id="date_from-error"></div>
        </div>
        <div class="form-group">
          <label for="date_to">Date To</label>
          <input type="date" id="date_to" class="form-control" />
          <div class="field-error" id="date_to-error"></div>
        </div>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" class="form-control" placeholder="Describe your experience…" rows="5" maxlength="5000"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="submit-btn">Save Changes</button>
        <a href="#" id="back-link" class="btn btn-ghost">Back to Destination</a>
      </div>
    </div>
  </div>

  <div id="error-state" style="display:none">
    <div class="empty-state">
      <div class="empty-state-icon">⚠️</div>
      <h3>Destination Not Found</h3>
      <p>This destination may have been deleted or you don't have permission to edit it.</p>
      <a href="index.html" class="btn btn-primary">Back to List</a>
    </div>
  </div>
</div>
<script type="module" src="dist/edit.js"></script>
</body>
</html>
