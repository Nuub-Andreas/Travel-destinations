<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Destinations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">✈ Travel<span>destinations</span></a>
  <ul class="navbar-nav" id="nav-auth-links"></ul>
  <div id="nav-user-info"></div>
</nav>

<div class="container section">
  <div class="list-controls">
    <div style="display:flex; align-items:center; gap:0.8rem;">
      <span class="count-badge" id="count-badge">Loading…</span>
    </div>
  </div>
  <div id="cards-container">
    <div class="loading-overlay">
      <div class="spinner"></div>
      <span>Loading destinations…</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-header"><h3>🗑 Delete Destination?</h3></div>
    <div class="modal-body">
      Are you sure you want to delete <strong id="delete-name"></strong>? This action cannot be undone.
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="cancel-delete-btn">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<script type="module" src="dist/index.js"></script>
</body>
</html>
