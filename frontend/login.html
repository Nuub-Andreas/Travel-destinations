<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Destinations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">✈ Travel<span>destinations</span></a>
  <ul class="navbar-nav">
    <li><a href="index.html" class="nav-link">Destinations</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-logo">✈ Travel<span>destinations</span></div>
      <h2>Welcome back</h2>
    </div>
    <div class="auth-body">
      <div id="form-alert" class="alert alert-error"></div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Your username" autocomplete="username" />
        <div class="field-error" id="username-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Your password" autocomplete="current-password" />
        <div class="field-error" id="password-error"></div>
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;margin-top:0.5rem">
        Log In
      </button>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>
</div>
<script type="module" src="dist/login.js"></script>
</body>
</html>
