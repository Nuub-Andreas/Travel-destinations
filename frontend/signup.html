<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel destinations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">✈ Travel<span>destinations</span></a>
  <ul class="navbar-nav">
    <li><a href="index.html" class="nav-link">Destinations</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-logo">✈ Travel<span>destinations</span></div>
      <h2>Create your account</h2>
    </div>
    <div class="auth-body">
      <div id="form-alert" class="alert alert-error"></div>
      <div class="form-group">
        <label for="username">Username <span class="required">*</span></label>
        <input type="text" id="username" class="form-control" placeholder="Choose a username" autocomplete="username" />
        <div class="field-error" id="username-error"></div>
      </div>
      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="you@email.com" autocomplete="email" />
        <div class="field-error" id="email-error"></div>
      </div>
      <div class="form-group">
        <label for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" class="form-control" placeholder="At least 6 characters" autocomplete="new-password" />
        <div class="field-error" id="password-error"></div>
        <div id="password-strength" style="margin-top:0.4rem; font-size:0.78rem; color:var(--muted); display:none"></div>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password <span class="required">*</span></label>
        <input type="password" id="confirm_password" class="form-control" placeholder="Repeat your password" autocomplete="new-password" />
        <div class="field-error" id="confirm_password-error"></div>
      </div>
      <button class="btn btn-primary" id="signup-btn" style="width:100%;justify-content:center;margin-top:0.5rem">
        Create Account
      </button>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</div>
<script type="module" src="dist/signup.js"></script>
</body>
</html>
